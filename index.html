<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#12161b">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg-deep:#12161b; --bg-panel:#1b2129; --bg-panel-2:#232a33; --line:#323b46;
  --amber:#d4a24c; --amber-soft:#e8c98a; --red:#c1443a; --green:#5fa876; --blue:#3a6fa8;
  --text:#eef1f3; --text-muted:#93a0aa; --paper:#e9e2d0;
  --radius:20px; --shadow:0 12px 30px rgba(0,0,0,.35);
}
[data-theme="light"]{
  --bg-deep:#f3ede0; --bg-panel:#fbf7ec; --bg-panel-2:#f1e9d5; --line:#ddd0ab;
  --amber:#b9812e; --amber-soft:#8f6222; --red:#b23b30; --green:#3f7a56; --blue:#2f6099;
  --text:#241f16; --text-muted:#6b6250; --paper:#fffdf6;
  --shadow:0 12px 26px rgba(120,100,50,.18);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; font-family:'Vazirmatn',sans-serif;
  background:
    radial-gradient(circle at 15% 0%, rgba(212,162,76,.08), transparent 40%),
    radial-gradient(circle at 100% 100%, rgba(212,162,76,.06), transparent 45%),
    var(--bg-deep);
  color:var(--text); min-height:100vh; display:flex; justify-content:center;
  transition:background .35s ease, color .35s ease; overflow-x:hidden;
}
#app{width:100%; max-width:480px; min-height:100vh; position:relative; display:flex; flex-direction:column; padding:calc(18px + env(safe-area-inset-top)) 18px calc(18px + env(safe-area-inset-bottom));}
.topbar{display:flex; align-items:center; justify-content:space-between; padding:6px 2px 14px; gap:8px;}
.brand{display:flex; align-items:center; gap:10px; min-width:0;}
.seal-img{width:40px;height:40px;border-radius:50%; object-fit:cover; border:2px solid var(--amber); box-shadow:var(--shadow); animation:breathe 4s ease-in-out infinite; flex-shrink:0; background:var(--bg-panel);}
@keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.07);}}
.brand h1{font-size:18px;margin:0;font-weight:800;letter-spacing:.3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.brand span{display:block;font-size:11px;color:var(--text-muted);font-weight:500;}
.topbar-actions{display:flex; gap:6px; flex-shrink:0;}
.icon-toggle{width:38px;height:38px;border-radius:50%; border:1px solid var(--line); background:var(--bg-panel); display:flex;align-items:center;justify-content:center; cursor:pointer; font-size:14px; font-weight:800; transition:transform .25s ease; color:var(--text);}
.icon-toggle:active{transform:scale(.88) rotate(12deg);}
.floating-back{position:fixed; bottom:18px; inset-inline-start:18px; z-index:60; width:46px;height:46px;border-radius:50%; border:1px solid var(--line); background:var(--bg-panel); box-shadow:var(--shadow); display:flex;align-items:center;justify-content:center; cursor:pointer; font-size:18px; color:var(--text);}
.floating-back:active{transform:scale(.88);}
.screen{flex:1; display:flex; flex-direction:column; gap:16px; animation:fadeSlideIn .4s cubic-bezier(.2,.8,.2,1);}
@keyframes fadeSlideIn{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}
.card{background:var(--bg-panel); border:1px solid var(--line); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow); animation:fadeSlideIn .45s cubic-bezier(.2,.8,.2,1);}
h2.title{font-size:20px; margin:0 0 4px; font-weight:800;}
p.sub{color:var(--text-muted); font-size:13.5px; margin:0 0 10px; line-height:1.9;}
.btn{border:none; border-radius:14px; padding:14px 18px; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:transform .15s ease, filter .15s ease, box-shadow .15s ease; position:relative; overflow:hidden;}
.btn:active{transform:scale(.96);}
.btn-primary{background:linear-gradient(135deg,var(--amber),var(--amber-soft)); color:#211505; box-shadow:0 8px 18px rgba(212,162,76,.28);}
.btn-outline{background:transparent; border:1.5px solid var(--line); color:var(--text);}
.btn-ghost{background:var(--bg-panel-2); color:var(--text);}
.btn-danger{background:linear-gradient(135deg,var(--red),#8f2f27); color:#fff;}
.btn:disabled{opacity:.4; cursor:not-allowed;}
.btn-block{width:100%;}
.row{display:flex; gap:10px;}
.player-row{display:flex; align-items:center; gap:10px; background:var(--bg-panel-2); border:1px solid var(--line); border-radius:14px; padding:10px 12px;}
.player-row input{flex:1; min-width:0; background:transparent; border:none; color:var(--text); font-family:inherit; font-size:15px; font-weight:600; outline:none;}
.avatar{width:34px;height:34px;border-radius:50%; display:flex;align-items:center;justify-content:center; background:var(--bg-deep); color:var(--amber); font-weight:800; font-size:14px; border:1px solid var(--line); flex-shrink:0;}
.icon-btn{width:32px;height:32px;border-radius:50%;border:none; background:transparent; color:var(--text-muted); font-size:18px; cursor:pointer; flex-shrink:0;}
.mode-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.mode-card{background:var(--bg-panel); border:1.5px solid var(--line); border-radius:16px; padding:14px 12px; text-align:center; cursor:pointer; transition:border-color .2s, transform .15s;}
.mode-card.active{border-color:var(--amber); box-shadow:0 0 0 3px rgba(212,162,76,.15);}
.mode-card:active{transform:scale(.97);}
.mode-card .emoji{font-size:26px; display:block; margin-bottom:6px;}
.mode-card b{font-size:13.5px; display:block;}
.mode-card small{color:var(--text-muted); font-size:11px;}
.chips{display:flex; flex-wrap:wrap; gap:8px;}
.chip{padding:7px 13px; border-radius:999px; border:1.5px solid var(--line); background:var(--bg-panel-2); font-size:12.5px; font-weight:700; cursor:pointer; color:var(--text-muted); transition:.15s;}
.chip.active{border-color:var(--amber); color:var(--amber); background:rgba(212,162,76,.1);}
.chip.all-chip{border-color:var(--blue); color:var(--blue);}
.chip.all-chip.active{border-color:var(--amber); color:var(--amber);}
.stamp{position:absolute; top:10px; inset-inline-start:10px; border:2px solid var(--red); color:var(--red); border-radius:8px; padding:3px 9px; font-size:11px; font-weight:800; transform:rotate(-8deg); opacity:.85; letter-spacing:1px; animation:wobble 3s ease-in-out infinite;}
@keyframes wobble{0%,100%{transform:rotate(-8deg);}50%{transform:rotate(-4deg);}}
.flip-wrap{perspective:1200px; margin:6px 0;}
.flip-card{position:relative; width:100%; height:210px; cursor:pointer; transform-style:preserve-3d; transition:transform .6s cubic-bezier(.2,.8,.2,1);}
.flip-card.flipped{transform:rotateY(180deg);}
.face{position:absolute; inset:0; border-radius:18px; backface-visibility:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:18px; text-align:center;}
.face-front{background:repeating-linear-gradient(135deg, rgba(212,162,76,.05) 0 10px, transparent 10px 20px), var(--bg-panel-2); border:1.5px dashed var(--amber);}
.face-front .big-seal{font-size:44px;}
.face-back{background:var(--paper); color:#241f16; transform:rotateY(180deg); border:2px solid var(--amber);}
.face-back .role-tag{font-size:12px; font-weight:800; letter-spacing:1px; color:var(--red); text-transform:uppercase;}
.face-back .word{font-size:30px; font-weight:900; margin-top:6px;}
.face-back .hint-label{font-size:11px; color:#6b6250; margin-top:2px;}
.turn-banner{text-align:center; padding:10px; border-radius:14px; background:var(--bg-panel-2); border:1px solid var(--line); font-weight:700; font-size:15px;}
.progress-dots{display:flex; gap:6px; justify-content:center; margin-top:4px;}
.progress-dots span{width:7px;height:7px;border-radius:50%; background:var(--line);}
.progress-dots span.done{background:var(--amber);}
.vote-list{display:flex; flex-direction:column; gap:10px;}
.vote-item{display:flex; align-items:center; justify-content:space-between; background:var(--bg-panel-2); border:1.5px solid var(--line); border-radius:14px; padding:12px 14px; cursor:pointer; transition:border-color .15s, background .15s;}
.vote-item.selected{border-color:var(--red); background:rgba(193,68,58,.1);}
.vote-item .name{display:flex; align-items:center; gap:10px; font-weight:700;}
.result-hero{text-align:center; padding:26px 10px 8px; position:relative; overflow:hidden;}
.result-hero .emoji{font-size:52px; display:block; margin-bottom:10px;}
.result-hero h2{font-size:22px; margin:0 0 6px;}
.result-hero p{color:var(--text-muted); font-size:14px; margin:0;}
.score-table{display:flex; flex-direction:column; gap:8px;}
.score-row{display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-radius:12px; background:var(--bg-panel-2); border:1px solid var(--line);}
.score-row b{font-size:14px;}
.score-row .pts{color:var(--amber); font-weight:800;}
canvas.board{width:100%; height:280px; border-radius:16px; border:1.5px solid var(--line); background:var(--paper); touch-action:none; display:block;}
.color-dot{width:26px;height:26px;border-radius:50%; border:2px solid var(--line); cursor:pointer;}
.color-dot.active{border-color:var(--amber); box-shadow:0 0 0 2px var(--amber);}
.pill{display:inline-flex; align-items:center; gap:6px; background:var(--bg-panel-2); border:1px solid var(--line); border-radius:999px; padding:5px 12px; font-size:12px; color:var(--text-muted); font-weight:600;}
.badge-mode{color:var(--amber); font-weight:800;}
.footer-note{text-align:center; font-size:11px; color:var(--text-muted); margin-top:auto; padding-top:14px;}
input[type=text]::placeholder{color:var(--text-muted);}
input[type=text],select.select-field{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid var(--line);background:var(--bg-panel-2);color:var(--text);font-family:inherit;font-size:14.5px;}
.timer-box{display:flex; align-items:center; justify-content:space-between; gap:10px; background:var(--bg-panel-2); border:1.5px solid var(--line); border-radius:14px; padding:10px 14px;}
.timer-box.warn{border-color:var(--red); animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(193,68,58,.4);}50%{box-shadow:0 0 0 6px rgba(193,68,58,0);}}
#timerDisplay{font-size:22px; font-weight:900; color:var(--amber); font-variant-numeric:tabular-nums;}
.stepper{display:flex; align-items:center; gap:10px;}
.stepper button{width:34px;height:34px;border-radius:50%; border:1px solid var(--line); background:var(--bg-panel); color:var(--text); font-size:16px; cursor:pointer; flex-shrink:0;}
.stepper-row{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:6px 2px;}
.switch-row{display:flex; align-items:center; justify-content:space-between; padding:4px 2px; gap:10px;}
.switch{width:46px; height:26px; border-radius:999px; background:var(--line); position:relative; cursor:pointer; transition:.2s; flex-shrink:0;}
.switch.on{background:var(--amber);}
.switch::after{content:''; position:absolute; top:3px; inset-inline-end:3px; width:20px; height:20px; border-radius:50%; background:#fff; transition:.2s;}
.switch.on::after{inset-inline-end:23px;}
.history-item{display:flex; align-items:center; justify-content:space-between; padding:9px 12px; border-radius:10px; background:var(--bg-panel-2); border:1px solid var(--line); font-size:12.5px;}
.history-item .win{color:var(--green); font-weight:800;}
.history-item .lose{color:var(--red); font-weight:800;}
.stat-row{display:flex; gap:10px;}
.stat-box{flex:1; text-align:center; background:var(--bg-panel-2); border:1px solid var(--line); border-radius:12px; padding:10px;}
.stat-box b{display:block; font-size:18px; color:var(--amber);}
.stat-box span{font-size:11px; color:var(--text-muted);}
.confetti{position:fixed; top:-20px; font-size:22px; pointer-events:none; animation:fall linear forwards; z-index:50;}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg); opacity:.2;}}
::-webkit-scrollbar{width:0;}
.credit-footer{text-align:center; padding:16px 6px 4px; color:var(--text-muted); font-size:11.5px; line-height:2;}
.credit-footer b{color:var(--amber); font-weight:800;}
.about-section{margin-bottom:16px;}
.about-section h3{font-size:15px; margin:0 0 6px; color:var(--amber); font-weight:800;}
.about-section p, .about-section li{font-size:13.5px; color:var(--text-muted); line-height:2;}
.about-section ul{margin:4px 0; padding-inline-start:20px;}
.video-btn{display:flex; align-items:center; gap:10px; background:linear-gradient(135deg,#c1443a,#8f2f27); color:#fff; border-radius:14px; padding:14px 16px; cursor:pointer; border:none; width:100%; font-family:inherit; font-weight:800; font-size:14px;}
.video-btn .yt{font-size:22px;}
.vpn-note{margin-top:10px; background:rgba(212,162,76,.1); border:1px solid var(--amber); border-radius:12px; padding:10px 12px; font-size:12.5px; color:var(--amber-soft); line-height:1.9;}
.hero-logo{text-align:center; padding:4px 0 6px;}
.hero-logo img{width:96px;height:96px;border-radius:50%; object-fit:cover; border:3px solid var(--amber); box-shadow:var(--shadow); background:var(--bg-panel);}
.hero-logo h1{font-size:22px; margin:10px 0 2px; font-weight:900;}
.hero-logo p{margin:0; color:var(--text-muted); font-size:13px;}
.word-row{display:flex; align-items:center; justify-content:space-between; gap:8px; background:var(--bg-panel-2); border:1px solid var(--line); border-radius:12px; padding:9px 12px;}
.word-row .wname{font-weight:700; font-size:13.5px;}
.word-row .wcat{font-size:11px; color:var(--text-muted); display:block;}
.word-actions{display:flex; gap:4px; flex-shrink:0;}
.field-label{font-size:12.5px; color:var(--text-muted); font-weight:700; margin:10px 0 6px;}
.lang-pill{font-size:12px; font-weight:900;}
.mm-dots span{animation:mmBlink 1.2s infinite; opacity:.2;}
.mm-dots span:nth-child(2){animation-delay:.2s;}
.mm-dots span:nth-child(3){animation-delay:.4s;}
@keyframes mmBlink{0%,100%{opacity:.2;}50%{opacity:1;}}
</style>

/* کلمات و دسته‌های سفارشی کاربر (در حافظهٔ محلی ذخیره می‌شود) */
let customWords = JSON.parse(localStorage.getItem('spy-custom-words') || '{"fa":{},"en":{}}');
function saveCustomWords(){ localStorage.setItem('spy-custom-words', JSON.stringify(customWords)); }

function getCategories(lang){ return [...Object.keys(BUILTIN_WORDS[lang]), ...Object.keys(customWords[lang]||{})]; }
function getWordBank(lang){
  const bank=[];
  Object.entries(BUILTIN_WORDS[lang]).forEach(([cat,words])=>words.forEach(w=>bank.push({cat,word:w,hint:cat,custom:false})));
  Object.entries(customWords[lang]||{}).forEach(([cat,words])=>words.forEach(w=>bank.push({cat,word:w,hint:cat,custom:true})));
  return bank;
}
function addCustomWord(cat, word, lang){
  cat=(cat||'').trim(); word=(word||'').trim();
  if(!cat || !word) return false;
  if(!customWords[lang]) customWords[lang]={};
  if(!customWords[lang][cat]) customWords[lang][cat]=[];
  if(customWords[lang][cat].includes(word)) return false;
  customWords[lang][cat].push(word);
  saveCustomWords();
  state.selectedCats.add(cat);
  return true;
}
function deleteCustomWord(cat, word, lang){
  if(!customWords[lang] || !customWords[lang][cat]) return;
  customWords[lang][cat]=customWords[lang][cat].filter(w=>w!==word);
  if(customWords[lang][cat].length===0){ delete customWords[lang][cat]; state.selectedCats.delete(cat); }
  saveCustomWords();
}
function editCustomWord(cat, oldWord, newWord, lang){
  newWord=(newWord||'').trim(); if(!newWord) return;
  if(!customWords[lang] || !customWords[lang][cat]) return;
  const idx=customWords[lang][cat].indexOf(oldWord);
  if(idx>-1) customWords[lang][cat][idx]=newWord;
  saveCustomWords();
}

function syncPlayerCount(){
  const total = Math.max(3, state.spyCount + state.civilianCount);
  while(state.players.length < total) state.players.push({name:t('player')+' '+(state.players.length+1), score:0});
  while(state.players.length > total) state.players.pop();
}

const app = document.getElementById('app');
let timerInterval=null;
let screenStack=[];
let lastRenderedScreen=null;

function render(){
  if(timerInterval && state.screen!=='play'){ clearInterval(timerInterval); timerInterval=null; }
  if(lastRenderedScreen!==null && lastRenderedScreen!==state.screen){
    screenStack.push(lastRenderedScreen);
  }
  lastRenderedScreen = state.screen;
  app.innerHTML=''; app.appendChild(Screens[state.screen]());
}
function goBack(){
  if(screenStack.length>0){
    state.screen = screenStack.pop();
    lastRenderedScreen = state.screen;
    app.innerHTML=''; app.appendChild(Screens[state.screen]());
  } else {
    haptic(20);
  }
}

setTheme(localStorage.getItem('spy-theme') || 'dark');

/* ---------------- صدا و لرزش ---------------- */
let actx=null;
function beep(freq=880, dur=0.12, type='sine'){
  if(!state.effects) return;
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type; o.frequency.value=freq; o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(0.15, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+dur);
    o.start(); o.stop(actx.currentTime+dur);
  }catch(e){}
}
function haptic(ms=15){ if(state.effects && navigator.vibrate) navigator.vibrate(ms); }

function topbar(){
  const bar=document.createElement('div'); bar.className='topbar';
  bar.innerHTML=`<div class="brand"><img src="${LOGO_DATA}" class="seal-img" alt="logo"/><div><h1>${t('appName')}</h1><span>${t('appTagline')}</span></div></div>`;

  const backNav=document.createElement('button'); backNav.className='floating-back'; backNav.textContent='⬅️';
  backNav.title=t('goBack');
  backNav.onclick=()=>{ goBack(); };
  bar.appendChild(backNav);

  const actions=document.createElement('div'); actions.className='topbar-actions';
  if(state.screen!=='about'){
    const info=document.createElement('button'); info.className='icon-toggle'; info.textContent='ℹ️';
    info.title=t('aboutTooltip');
    info.onclick=()=>{ screenBeforeAbout=state.screen; state.screen='about'; render(); };
    actions.appendChild(info);
  }

  const langBtn=document.createElement('button'); langBtn.className='icon-toggle lang-pill';
  langBtn.textContent = state.lang==='fa' ? 'EN' : 'فا';
  langBtn.title=t('changeLanguage');
  langBtn.onclick=()=>{
    state.lang = state.lang==='fa' ? 'en' : 'fa';
    localStorage.setItem('spy-lang', state.lang);
    applyLangDir();
    resetSelectedCatsForLang();
    syncPlayerCount();
    render();
  };
  actions.appendChild(langBtn);

  const sound=document.createElement('button'); sound.className='icon-toggle';
  sound.textContent = state.effects ? '🔔' : '🔕';
  sound.title=t('toggleSound');
  sound.onclick=()=>{ state.effects=!state.effects; localStorage.setItem('spy-effects', JSON.stringify(state.effects)); render(); };
  actions.appendChild(sound);

  const toggle=document.createElement('button'); toggle.className='icon-toggle';
  toggle.textContent = document.body.getAttribute('data-theme')==='dark' ? '☀️' : '🌙';
  toggle.title=t('changeTheme');
  toggle.onclick=()=>{ const cur=document.body.getAttribute('data-theme'); setTheme(cur==='dark'?'light':'dark'); render(); };
  actions.appendChild(toggle);

  bar.appendChild(actions);
  return bar;
}

function startRound(){
  const pool = getWordBank(state.lang).filter(w=>state.selectedCats.has(w.cat));
  if(!pool.length) return;
  const chosen = pool[Math.floor(Math.random()*pool.length)];
  const order = shuffle([...Array(state.players.length).keys()]);
  const spyIndices = order.slice(0, Math.max(1, Math.min(state.spyCount, state.players.length-2)));
  state.round = {spyIndices, word:chosen.word, hint:chosen.hint, revealIdx:0, flipped:false};
  state.votes={}; state.currentVoter=0; state.oneWordAnswers={};
  state.turnOrder = shuffle([...Array(state.players.length).keys()]);
  state.screen='reveal';
  beep(660,.1); haptic(10);
  render();
}
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }

function timerComponent(){
  const box=document.createElement('div'); box.className='timer-box'; box.id='timerBox';
  box.innerHTML=`<span class="sub" style="margin:0;">${t('timeRemaining')}</span><span id="timerDisplay">--:--</span>`;
  if(!timerInterval){
    let remaining = state.timerMinutes*60;
    const update=()=>{
      const el=document.getElementById('timerDisplay');
      const b=document.getElementById('timerBox');
      if(!el||!b){ clearInterval(timerInterval); timerInterval=null; return; }
      const mm=String(Math.floor(remaining/60)).padStart(2,'0'), ss=String(remaining%60).padStart(2,'0');
      el.textContent=`${mm}:${ss}`;
      if(remaining<=10) b.classList.add('warn');
      if(remaining<=0){ beep(300,.4,'square'); haptic(200); clearInterval(timerInterval); timerInterval=null; el.textContent=t('timeUp'); return; }
      remaining--;
    };
    update();
    timerInterval=setInterval(update,1000);
  }
  return box;
}

function playDraw(){
  const c=document.createElement('div'); c.className='card';

  const canvas=document.createElement('canvas'); canvas.className='board'; canvas.id='board';
  c.appendChild(canvas);
  const colors=['#241f16','#c1443a','#3f7a56','#3a5fa8','#d4a24c'];
  const row=document.createElement('div'); row.className='row'; row.style.cssText='margin-top:10px;justify-content:center;';
  let currentColor=colors[0];
  colors.forEach((col,i)=>{
    const dot=document.createElement('div'); dot.className='color-dot'+(i===0?' active':''); dot.style.background=col;
    dot.onclick=()=>{ currentColor=col; [...row.children].forEach(ch=>ch.classList.remove('active')); dot.classList.add('active'); };
    row.appendChild(dot);
  });
  c.appendChild(row);
  const clearBtn=document.createElement('button'); clearBtn.className='btn btn-outline btn-block'; clearBtn.style.marginTop='10px'; clearBtn.textContent=t('clearBoard');
  c.appendChild(clearBtn);
  setTimeout(()=>{
    const canvasEl=document.getElementById('board'); const ctx=canvasEl.getContext('2d');
    function resize(){ const rect=canvasEl.getBoundingClientRect(); canvasEl.width=rect.width*2; canvasEl.height=rect.height*2; ctx.scale(2,2); ctx.lineCap='round'; ctx.lineJoin='round'; ctx.lineWidth=4; }
    resize();
    let drawing=false, lastX=0,lastY=0;
    function pos(e){ const rect=canvasEl.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return [(t.clientX-rect.left),(t.clientY-rect.top)]; }
    function start(e){ drawing=true; [lastX,lastY]=pos(e); }
    function move(e){ if(!drawing) return; e.preventDefault(); const [x,y]=pos(e); ctx.strokeStyle=currentColor; ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y); ctx.stroke(); [lastX,lastY]=[x,y]; }
    function end(){ drawing=false; }
    canvasEl.addEventListener('mousedown',start); canvasEl.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
    canvasEl.addEventListener('touchstart',start,{passive:true}); canvasEl.addEventListener('touchmove',move,{passive:false}); canvasEl.addEventListener('touchend',end);
    clearBtn.onclick=()=>{ ctx.clearRect(0,0,canvasEl.width,canvasEl.height); };
  },0);
  return c;
}

let lastResult=null;
function computeResult(){
  const tally={};
  Object.values(state.votes).forEach(v=>{ tally[v]=(tally[v]||0)+1; });
  let maxVotes=-1, accused=null, tie=false;
  Object.entries(tally).forEach(([idx,c])=>{
    if(c>maxVotes){ maxVotes=c; accused=Number(idx); tie=false; }
    else if(c===maxVotes){ tie=true; }
  });
  const spyCaught = !tie && state.round.spyIndices.includes(accused);
  lastResult={tally, accused, tie, spyCaught, accusedIdx:accused};
  state.screen='spyGuess';
  return ScreenSpyGuess();
}

function ScreenSpyGuess(){
  const wrap=document.createElement('div'); wrap.className='screen';
  wrap.appendChild(topbar());
  const r=lastResult;
  const spyNames = state.round.spyIndices.map(i=>state.players[i].name).join('، ');
  const card=document.createElement('div'); card.className='card';
  if(!r.spyCaught){
    card.innerHTML=`<h2 class="title">${t('spyNotCaughtTitle')}</h2>
      <p class="sub">${r.tie?t('spyNotCaughtTie'):t('spyNotCaughtWrong')} ${t('spyWonWith',{name:spyNames})}</p>
      <p class="sub">${t('secretWordWas',{word:'<b style="color:var(--amber);">'+state.round.word+'</b>'})}</p>`;
    wrap.appendChild(card);
    const btn=document.createElement('button'); btn.className='btn btn-primary btn-block'; btn.textContent=t('viewFinalResult');
    btn.onclick=()=>finishRound(false, false);
    wrap.appendChild(btn);
    return wrap;
  }
  card.innerHTML=`<h2 class="title">${t('spyCaughtTitle',{name:state.players[r.accusedIdx].name})}</h2>
    <p class="sub">${t('spyLastChance')}</p>`;
  const inp=document.createElement('input'); inp.type='text'; inp.placeholder=t('guessPlaceholder');
  inp.style.marginTop='8px';
  card.appendChild(inp);
  wrap.appendChild(card);
  const btn=document.createElement('button'); btn.className='btn btn-danger btn-block'; btn.textContent=t('registerGuessFinish');
  btn.onclick=()=>{
    const guess=(inp.value||'').trim();
    const correct = guess && guess.replace(/\s/g,'')===state.round.word.replace(/\s/g,'');
    finishRound(true, correct);
  };
  wrap.appendChild(btn);
  return wrap;
}

function finishRound(spyCaught, spyGuessedRight){
  const citizensWin = !spyCaught ? false : !spyGuessedRight;
  state.players.forEach((p,i)=>{
    if(state.round.spyIndices.includes(i)){ if(!citizensWin) p.score += 3; }
    else { if(citizensWin) p.score += 1; }
  });
  lastResult.citizensWin=citizensWin; lastResult.spyCaught=spyCaught; lastResult.spyGuessedRight=spyGuessedRight;
  const spyNamesForHistory = state.round.spyIndices.map(i=>state.players[i].name).join('، ');
  state.history.unshift({word:state.round.word, spyName:spyNamesForHistory, citizensWin});
  if(state.history.length>20) state.history.pop();
  beep(citizensWin?880:260, .25, citizensWin?'sine':'sawtooth'); haptic(citizensWin?[30,50,30]:[80]);
  state.screen='result';
  render();
}

/* ================= بازی آنلاین چندنفره (Socket.IO) ================= */
/* آدرس سرور Node.js + Socket.IO که در پوشهٔ server/ این پروژه قرار دارد.
   بعد از دیپلوی روی Render/Railway، این مقدار را با آدرس واقعی سرورت عوض کن،
   یا موقتاً با ?server=https://... در URL هم می‌توانی override کنی. */
const ONLINE_SERVER_URL = (new URLSearchParams(location.search).get('server'))
  || 'https://YOUR-SERVER-NAME.onrender.com'; // TODO: بعد از دیپلوی سرور این را عوض کن

let online = {
  socket:null, connected:false, connecting:false,
  myId:null, myName: (state.players[0] && state.players[0].name) || 'بازیکن',
  roomCode:'', hostId:null, isQuickMatch:false,
  players:[], // [{id,name,score}]
  phase:'lobby', // lobby | reveal | voting | result
  myRole:null, // {isSpy, word, category}
  voted:false, voteCounts:{}, votedCount:0,
  result:null, // {spyIds, word, category, voteCounts, spyCaught, scores}
  spyCount:1, timerMinutes:0, timerEndsAt:null,
  searching:false, queueCount:0, queueNeeded:3,
  error:''
};

function onlineConfigured(){ return ONLINE_SERVER_URL && !ONLINE_SERVER_URL.includes('YOUR-SERVER-NAME'); }

/* یک اتصال Socket.IO واحد که تا وقتی کاربر در صفحات آنلاینه زنده می‌مونه. */
function ensureSocket(){
  if(online.socket) return online.socket;
  if(typeof io === 'undefined'){ online.error=t('onlineConnError'); return null; }
  const socket = io(ONLINE_SERVER_URL, { transports:['websocket','polling'] });
  online.socket = socket;

  socket.on('connect', ()=>{ online.connected=true; online.connecting=false; render(); });
  socket.on('disconnect', ()=>{
    online.connected=false; online.connecting=false;
    online.error=t('onlineConnError');
    render();
  });
  socket.on('connect_error', ()=>{ online.connecting=false; online.error=t('onlineConnError'); render(); });

  socket.on('welcome', (msg)=>{
    online.myId = msg.yourId; online.roomCode = msg.roomCode; online.isQuickMatch = !!msg.quickMatch;
    online.searching=false;
    if(!online.isQuickMatch) state.screen='onlineLobby';
    render();
  });

  socket.on('matchmakingUpdate', (msg)=>{
    online.searching = true; online.queueCount = msg.count||0; online.queueNeeded = msg.needed||3;
    render();
  });

  socket.on('roomState', (msg)=>{
    online.players = msg.players; online.hostId = msg.hostId; online.roomCode = msg.roomCode || online.roomCode;
    if(msg.phase==='lobby'){
      online.phase='lobby'; online.myRole=null; online.result=null; online.voted=false; online.voteCounts={}; online.votedCount=0; online.timerEndsAt=null;
      if(state.screen!=='onlineLobby'){ state.screen='onlineLobby'; }
    }
    render();
  });

  socket.on('roleReveal', (msg)=>{
    online.myRole = {isSpy:msg.isSpy, word:msg.word, category:msg.category};
    online.phase='reveal'; online.voted=false; online.voteCounts={}; online.votedCount=0; online.result=null;
    state.screen='onlineReveal'; render();
  });

  socket.on('roundStarted', (msg)=>{
    online.timerMinutes = msg.timerMinutes||0; online.timerEndsAt = msg.timerEndsAt||null;
    render();
  });

  socket.on('votingStart', ()=>{
    online.phase='voting'; online.voted=false; online.voteCounts={}; online.votedCount=0; online.timerEndsAt=null;
    state.screen='onlineVoting'; render();
  });

  socket.on('voteUpdate', (msg)=>{
    online.voteCounts = msg.votes||{}; online.votedCount = msg.votedCount||0;
    render();
  });

  socket.on('roundResult', (msg)=>{
    online.phase='result'; online.result = msg;
    state.screen='onlineResult'; render();
  });

  return socket;
}

function findQuickMatch(){
  if(!onlineConfigured()){ window.alert(t('onlineNotConfigured')); return; }
  online.error=''; online.connecting=true; online.searching=true;
  state.screen='onlineHome'; render();
  const socket = ensureSocket();
  if(!socket) return;
  const emit = ()=> socket.emit('findMatch', { name: online.myName||'Player', lang: state.lang });
  if(socket.connected) emit(); else socket.once('connect', emit);
}

function cancelQuickMatch(){
  online.searching=false;
  if(online.socket) online.socket.emit('cancelFindMatch');
  render();
}

function createOnlineRoom(){
  if(!onlineConfigured()){ window.alert(t('onlineNotConfigured')); return; }
  online.error=''; online.connecting=true; render();
  const socket = ensureSocket();
  if(!socket) return;
  const emit = ()=> socket.emit('createRoom', { name: online.myName||'Player' }, (res)=>{
    online.connecting=false;
    if(!res || !res.ok){ online.error=t('onlineConnError'); render(); }
  });
  if(socket.connected) emit(); else socket.once('connect', emit);
}

function joinOnlineRoom(code){
  if(!onlineConfigured()){ window.alert(t('onlineNotConfigured')); return; }
  online.error=''; online.connecting=true; render();
  const socket = ensureSocket();
  if(!socket) return;
  const emit = ()=> socket.emit('joinRoom', { code: code.toUpperCase(), name: online.myName||'Player' }, (res)=>{
    online.connecting=false;
    if(!res || !res.ok){ online.error=t('onlineConnError'); render(); }
  });
  if(socket.connected) emit(); else socket.once('connect', emit);
}

function onlineSend(msg){
  if(!online.socket || !online.socket.connected) return;
  const { type, ...payload } = msg;
  online.socket.emit(type, payload);
}

function leaveRoom(){
  if(online.socket){ try{ online.socket.emit('leaveRoom'); online.socket.disconnect(); }catch(e){} }
  online = { ...online, socket:null, connected:false, connecting:false, myId:null, roomCode:'', hostId:null,
    isQuickMatch:false, players:[], phase:'lobby', myRole:null, voted:false, voteCounts:{}, votedCount:0,
    result:null, timerEndsAt:null, searching:false, queueCount:0, error:'' };
  state.screen='onlineHome'; render();
}

function myOnlineWordPool(){
  return getWordBank(state.lang).filter(w=>state.selectedCats.has(w.cat)).map(w=>({cat:w.cat, word:w.word}));
}

    const settingsCard=document.createElement('div'); settingsCard.className='card';
    settingsCard.innerHTML=`<h2 class="title">${t('spyCountLabel')}</h2>`;
    const stepper=document.createElement('div'); stepper.className='stepper'; stepper.style.justifyContent='center';
    const minus=document.createElement('button'); minus.textContent='−';
    minus.onclick=()=>{ online.spyCount=Math.max(1,online.spyCount-1); render(); };
    const val=document.createElement('b'); val.style.fontSize='16px'; val.textContent=online.spyCount;
    const plus=document.createElement('button'); plus.textContent='+';
    plus.onclick=()=>{ online.spyCount=Math.min(4,online.spyCount+1); render(); };
    stepper.appendChild(minus); stepper.appendChild(val); stepper.appendChild(plus);
    settingsCard.appendChild(stepper);
    wrap.appendChild(settingsCard);

    const startBtn=document.createElement('button'); startBtn.className='btn btn-primary btn-block';
    startBtn.textContent=t('onlineStartRound');
    const enough = online.players.length>=3;
    startBtn.disabled=!enough;
    startBtn.onclick=()=>{
      const pool = myOnlineWordPool();

  leaveBtn.textContent=t('onlineLeaveRoom');
  leaveBtn.onclick=leaveRoom;
